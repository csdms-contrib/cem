name: Build/Test

on: [push, pull_request]

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  BUILD_DIR: _build
  INSTALL_DIR: _install

jobs:
  build-and-test:
    if:
      github.event_name == 'push' || github.event.pull_request.head.repo.full_name != github.repository

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash -l {0}

    strategy:
      matrix:
        os: [ubuntu-latest]
        build-type: [Release]

    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v3
        with:
          micromamba-version: latest
          environment-file: environment.yml
          init-shell: >-
            bash
            powershell

      - name: Configure CMake
        run: |
          cmake -B $BUILD_DIR --fresh

      - name: Build
        run: cmake --build $BUILD_DIR --config ${{ matrix.build-type }}

      - name: Test
        run: ctest --test-dir $BUILD_DIR -C ${{ matrix.build-type }} --output-on-failure -VV

      - name: Install
        run: cmake --install $BUILD_DIR --prefix $INSTALL_DIR

      - name: Check
        run: |
            find $INSTALL_DIR -type d,f
            $INSTALL_DIR/bin/cem --version
            $INSTALL_DIR/bin/cem --help
